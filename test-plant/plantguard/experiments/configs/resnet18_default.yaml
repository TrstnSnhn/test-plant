experiment_name: resnet18_finetune_default
model:
  architecture: resnet18
  pretrained: true
  num_classes: 8
  freeze_epochs: 1
  unfreeze_epochs: 1
data:
  batch_size: 8
  num_workers: 0
  augmentation: true
training:
  optimizer: adam
  lr_frozen: 0.001
  lr_unfrozen: 0.0001
  scheduler_patience: 3
  scheduler_factor: 0.1
  early_stopping_patience: 5
  seed: 42
